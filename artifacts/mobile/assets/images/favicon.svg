<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#07182E"/>
  <!-- Red glow top-left -->
  <radialGradient id="rg" cx="35%" cy="35%" r="55%">
    <stop offset="0%" stop-color="#C8102E" stop-opacity="0.45"/>
    <stop offset="100%" stop-color="#C8102E" stop-opacity="0"/>
  </radialGradient>
  <rect width="100" height="100" rx="22" fill="url(#rg)"/>
  <!-- Football shadow -->
  <ellipse cx="51" cy="57" rx="37" ry="22" fill="rgba(0,0,0,0.35)"/>
  <!-- Football gradient -->
  <defs>
    <linearGradient id="fg" x1="20%" y1="15%" x2="85%" y2="90%">
      <stop offset="0%" stop-color="#D4873F"/>
      <stop offset="55%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#4A2208"/>
    </linearGradient>
  </defs>
  <!-- Football body -->
  <ellipse cx="50" cy="52" rx="37" ry="22" fill="url(#fg)"/>
  <!-- Highlight -->
  <ellipse cx="37" cy="43" rx="15" ry="9" fill="rgba(255,220,150,0.2)"/>
  <!-- Center seam -->
  <line x1="15" y1="52" x2="85" y2="52" stroke="white" stroke-width="2.2" stroke-opacity="0.85"/>
  <!-- Vertical lace -->
  <line x1="50" y1="35" x2="50" y2="69" stroke="white" stroke-width="2" stroke-opacity="0.9"/>
  <!-- Horizontal laces -->
  <line x1="41" y1="40" x2="59" y2="40" stroke="white" stroke-width="1.6" stroke-opacity="0.9"/>
  <line x1="40" y1="46" x2="60" y2="46" stroke="white" stroke-width="1.6" stroke-opacity="0.9"/>
  <line x1="40" y1="58" x2="60" y2="58" stroke="white" stroke-width="1.6" stroke-opacity="0.9"/>
  <line x1="41" y1="64" x2="59" y2="64" stroke="white" stroke-width="1.6" stroke-opacity="0.9"/>
  <!-- VFL label -->
  <text x="50" y="89" font-family="Arial Black, Arial" font-weight="900" font-size="11" fill="#C8102E" text-anchor="middle" letter-spacing="2.5">VFL</text>
</svg>
